<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog preview card challenge</title>
</head>
<body>
    <article class="blog-card">
        <header>
            <img src="illustration-article.svg" alt="Illustration HTML & CSS foundations" class="blog-card__image">
        </header>
        <main class="blog-card__content">
            <span class="blog-card__category">Learning</span>

            <p class="blog-card__publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>

            <h2 class="blog-card__title"><a href="#">HTML & CSS foundations</a></h2>

            <p class="blog-card__description">
            These languages are the backbone of every website, defining structure, content, and presentation.
            </p>
        </main>
        <footer class="blog-card__author">
            <img class="blog-card__avatar" src="image-avatar.webp" alt="Greg Hooper">
            <strong>Greg Hooper</strong>
        </footer>
    </article>
</body>
</html>
