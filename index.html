<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog preview card challenge</title>
    <link rel="shortcut icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="wrapper">
        <article class="blog-card">
            <header>
                <img src="assets/images/illustration-article.svg" alt="Illustration HTML & CSS foundations" class="blog-card__image">
            </header>
            <div class="blog-card__content">
                <span class="blog-card__label">Learning</span>

                <p class="blog-card__publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>

                <h1 class="blog-card__title">
                    <a href="#" class="blog-card__link">HTML & CSS foundations</a>
                </h1>

                <p class="blog-card__description">
                These languages are the backbone of every website, defining structure, content, and presentation.
                </p>
            </div>
            <footer class="blog-card__author">
                <img class="blog-card__avatar" src="assets/images/image-avatar.webp" alt="Greg Hooper">
                <strong>Greg Hooper</strong>
            </footer>
        </article>
    </main>

</body>
</html>
